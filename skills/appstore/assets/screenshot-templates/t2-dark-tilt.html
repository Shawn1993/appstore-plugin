<!doctype html><meta charset="utf-8">
<style>
/* 模板 T2「dark-tilt」— 源自库帧10：近黑底，机身斜置 -2.4°，标题在上
   画布 1290×2796 */
:root{ --bg:#060506; --ink:#ffffff; --accent:#c8a45c; --title-size:118px; }
*{margin:0;box-sizing:border-box}
html,body{width:1290px;height:2796px;overflow:hidden}
body{background:var(--bg);position:relative;font-family:-apple-system,"PingFang SC","Noto Sans SC",sans-serif}
.eyebrow{position:absolute;left:50%;transform:translateX(-50%);top:270px;color:var(--accent);font-size:44px;font-weight:600;letter-spacing:.42em;padding-left:.42em}
.title{position:absolute;left:0;right:0;top:360px;text-align:center;color:var(--ink);font-size:var(--title-size);line-height:1.3;font-weight:600;white-space:pre-line}
.device{position:absolute;left:50%;top:1010px;width:1030px;height:2107px;transform:translateX(-50%) rotate(-2.4deg);background:#141416;border-radius:150px;padding:26px;box-shadow:0 80px 160px -40px rgba(0,0,0,.9)}
.device .screen{width:100%;height:100%;border-radius:124px;overflow:hidden;background:#111;position:relative}
.device .screen img{width:100%;height:100%;object-fit:cover;object-position:top}
.island{position:absolute;top:56px;left:50%;transform:translateX(-50%);width:290px;height:84px;background:#0b0b0d;border-radius:60px;z-index:2}
.glow{position:absolute;left:50%;top:1500px;transform:translateX(-50%);width:1600px;height:1600px;border-radius:50%;background:radial-gradient(circle,rgba(200,164,92,.14),transparent 62%)}
</style>
<div class="glow"></div>
<div class="eyebrow">名帖临读</div>
<h1 class="title">历代真迹
逐字放大细读</h1>
<div class="device"><div class="screen"><div class="island"></div><img src="{SCREENSHOT_PATH}" alt=""></div></div>
