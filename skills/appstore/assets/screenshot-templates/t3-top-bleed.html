<!doctype html><meta charset="utf-8">
<style>
/* 模板 T3「top-bleed」— 源自库帧16：亮底+装饰块，机身顶部出血，标题+副题在下
   画布 1290×2796 */
:root{ --bg:#ffb200; --deco:#fbd855; --ink:#141414; --title-size:112px; }
*{margin:0;box-sizing:border-box}
html,body{width:1290px;height:2796px;overflow:hidden}
body{background:var(--bg);position:relative;font-family:-apple-system,"PingFang SC","Noto Sans SC",sans-serif}
.deco{position:absolute;background:var(--deco);width:1500px;height:1500px;transform:rotate(18deg)}
.device{position:absolute;left:50%;transform:translateX(-50%);top:-320px;width:1030px;height:2107px;background:#0b0b0d;border-radius:150px;padding:26px;box-shadow:0 70px 150px -50px rgba(0,0,0,.45)}
.device .screen{width:100%;height:100%;border-radius:124px;overflow:hidden;background:#fff}
.device .screen img{width:100%;height:100%;object-fit:cover;object-position:top}
.title{position:absolute;left:0;right:0;top:2010px;text-align:center;color:var(--ink);font-size:var(--title-size);line-height:1.3;font-weight:700;white-space:pre-line}
.sub{position:absolute;left:0;right:0;top:2380px;text-align:center;color:var(--ink);opacity:.72;font-size:56px;font-weight:500}
</style>
<div class="deco" style="left:-700px;top:1900px"></div>
<div class="deco" style="left:900px;top:-900px;transform:rotate(-14deg)"></div>
<div class="device"><div class="screen"><img src="{SCREENSHOT_PATH}" alt=""></div></div>
<h1 class="title">一字千形
历代写法一眼尽览</h1>
<p class="sub">楷 行 草 隶 篆 · 按书家筛选</p>
