<style>
:root{
  --bg:#f5f5f7;--card:#ffffff;--line:#d2d2d7;--hair:#e8e8ed;--ink:#1d1d1f;--ink2:#6e6e73;
  --blue:#0071e3;--link:#0066cc;--hover:#e8e8ed;
  --ok:#23a94a;--ok-bg:#e8f6ec;--warn:#c98600;--warn-bg:#fff4de;--crit:#e30000;--crit-bg:#fdecea;
  --tipbg:#1d1d1f;--tipfg:#f5f5f7;--shadow:0 1px 3px rgba(0,0,0,.06);
}
@media (prefers-color-scheme: dark){:root{
  --bg:#161617;--card:#1d1d1f;--line:#424245;--hair:#2d2d2f;--ink:#f5f5f7;--ink2:#a1a1a6;
  --blue:#2997ff;--link:#2997ff;--hover:#2d2d2f;
  --ok:#30d158;--ok-bg:#0f2917;--warn:#ffd60a;--warn-bg:#2e2610;--crit:#ff453a;--crit-bg:#331512;
  --tipbg:#f5f5f7;--tipfg:#1d1d1f;--shadow:0 1px 3px rgba(0,0,0,.4);
}}
:root[data-theme="dark"]{
  --bg:#161617;--card:#1d1d1f;--line:#424245;--hair:#2d2d2f;--ink:#f5f5f7;--ink2:#a1a1a6;
  --blue:#2997ff;--link:#2997ff;--hover:#2d2d2f;
  --ok:#30d158;--ok-bg:#0f2917;--warn:#ffd60a;--warn-bg:#2e2610;--crit:#ff453a;--crit-bg:#331512;
  --tipbg:#f5f5f7;--tipfg:#1d1d1f;--shadow:0 1px 3px rgba(0,0,0,.4);
}
:root[data-theme="light"]{
  --bg:#f5f5f7;--card:#ffffff;--line:#d2d2d7;--hair:#e8e8ed;--ink:#1d1d1f;--ink2:#6e6e73;
  --blue:#0071e3;--link:#0066cc;--hover:#e8e8ed;
  --ok:#23a94a;--ok-bg:#e8f6ec;--warn:#c98600;--warn-bg:#fff4de;--crit:#e30000;--crit-bg:#fdecea;
  --tipbg:#1d1d1f;--tipfg:#f5f5f7;--shadow:0 1px 3px rgba(0,0,0,.06);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font:14px/1.65 -apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Noto Sans SC",sans-serif}
a{color:var(--link);text-decoration:none}
a:hover{text-decoration:underline}
/* ===== 顶栏 ===== */
.topbar{position:sticky;top:0;z-index:30;background:color-mix(in srgb,var(--card) 86%,transparent);backdrop-filter:blur(20px);border-bottom:1px solid var(--hair);padding:0 24px;height:52px;display:flex;align-items:center;gap:12px}
.topbar .crumb{color:var(--ink2);font-size:13px}
.topbar .crumb b{color:var(--ink);font-weight:600}
.badge{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:500;margin-left:auto;color:var(--ink2)}
.badge .dot{width:9px;height:9px;border-radius:50%;background:var(--warn)}
/* ===== 布局 ===== */
.layout{display:flex;max-width:1200px;margin:0 auto;min-height:calc(100vh - 52px)}
aside{width:230px;flex:none;padding:24px 12px 24px 20px}
.appid{display:flex;gap:11px;align-items:center;padding:4px 10px 18px}
.appicon{width:44px;height:44px;border-radius:10px;background:linear-gradient(145deg,#3a3125,#171310);color:#e8ddc6;display:flex;align-items:center;justify-content:center;font:600 21px/1 "Songti SC","STSong",serif;flex:none;box-shadow:var(--shadow)}
.appid b{font-size:15px;display:block;line-height:1.3}
.appid small{color:var(--ink2);font-size:12px}
.navgroup{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--ink2);padding:14px 10px 6px}
aside nav{display:flex;flex-direction:column;gap:1px}
aside nav button{display:flex;align-items:center;gap:8px;font:400 13.5px/1.2 inherit;color:var(--ink);background:none;border:0;border-radius:8px;padding:8px 10px;cursor:pointer;text-align:left;width:100%;transition:background .18s}
aside nav button:hover{background:var(--hover)}
aside nav button.on{background:var(--hover);font-weight:600}
aside nav button .n{margin-left:auto;font-size:11px;color:var(--ink2);background:var(--bg);border:1px solid var(--hair);border-radius:99px;padding:1px 7px;font-variant-numeric:tabular-nums}
aside nav button .n.alert{color:#fff;background:var(--crit);border-color:var(--crit)}
main{flex:1;min-width:0;padding:28px 28px 80px;border-left:1px solid var(--hair)}
main>section{display:none}
main>section.on{display:block;animation:fadein .2s ease}
@keyframes fadein{from{opacity:0}to{opacity:1}}
h1{font:650 21px/1.3 inherit;letter-spacing:-.01em;margin:0 0 3px}
.sub{color:var(--ink2);font-size:13px;margin:0 0 18px}
/* ===== 卡片与字段（ASC 式：label 上 value 下） ===== */
.card{background:var(--card);border:1px solid var(--hair);border-radius:10px;margin-bottom:16px;overflow:hidden}
.card-h{padding:14px 20px 0}
.card-h h3{font:600 17px/1.4 inherit;margin:0}
.card-h p{color:var(--ink2);font-size:12.5px;margin:2px 0 0}
.card-b{padding:12px 20px 16px}
.field{padding:11px 0;border-bottom:1px solid var(--hair);position:relative}
.field:last-child{border-bottom:0;padding-bottom:2px}
.field:first-child{padding-top:2px}
.flabel{font-size:13px;font-weight:600;display:flex;align-items:baseline;gap:8px;margin-bottom:4px}
.flabel .lim{font-weight:400;font-size:11px;color:var(--ink2);font-family:ui-monospace,"SF Mono",Menlo,monospace}
.fvalue{font-size:14px;white-space:pre-wrap;word-break:break-word;color:var(--ink);margin:0}
.fvalue.mono{font-family:ui-monospace,"SF Mono",Menlo,monospace;font-size:12.5px}
.copy{position:absolute;right:0;top:10px;font:500 12px/1 inherit;color:var(--link);background:none;border:1px solid var(--line);border-radius:99px;padding:5px 12px;cursor:pointer;opacity:0;transition:opacity .18s,background .18s}
.field:hover .copy{opacity:1}
.copy:hover{background:var(--hover)}
.copy:active{transform:translateY(1px)}
.copy.ok{color:var(--ok);border-color:var(--ok);opacity:1}
.ev{font-family:ui-monospace,"SF Mono",Menlo,monospace;font-size:12px;background:var(--bg);border:1px solid var(--hair);padding:1px 6px;border-radius:5px;word-break:break-all}
/* 状态横幅（ASC 版本状态样式） */
.statusbar{display:flex;gap:12px;align-items:flex-start;background:var(--card);border:1px solid var(--hair);border-radius:10px;padding:15px 20px;margin-bottom:16px}
.statusbar .dot{width:11px;height:11px;border-radius:50%;background:var(--warn);margin-top:7px;flex:none}
.statusbar b{font-size:15px}
.statusbar p{margin:2px 0 0;color:var(--ink2);font-size:13px}
.statusbar.ok .dot{background:var(--ok)}
.statusbar.crit .dot{background:var(--crit)}
/* 流程步骤 */
.steps{display:flex;margin:2px 0 20px;overflow-x:auto}
.step{flex:1;min-width:84px;text-align:center;font-size:12px;color:var(--ink2);position:relative;padding-top:19px}
.step::before{content:"";width:10px;height:10px;border-radius:50%;background:var(--line);position:absolute;top:2px;left:50%;transform:translateX(-50%)}
.step::after{content:"";height:2px;background:var(--hair);position:absolute;top:6px;left:calc(50% + 8px);right:calc(-50% + 8px)}
.step:last-child::after{display:none}
.step.done{color:var(--ok)}.step.done::before{background:var(--ok)}
.step.now{color:var(--ink);font-weight:600}.step.now::before{background:var(--warn);box-shadow:0 0 0 4px color-mix(in srgb,var(--warn) 22%,transparent)}
/* 键值表 */
.kv{width:100%;border-collapse:collapse;font-size:13.5px}
.kv td{padding:9px 10px 9px 0;border-bottom:1px solid var(--hair);vertical-align:top}
.kv td:first-child{color:var(--ink2);white-space:nowrap;width:10em}
.kv tr:last-child td{border-bottom:0}
/* 截图（ASC「预览和截图」横排风格） */
.shotrow{display:flex;gap:14px;overflow-x:auto;padding:4px 2px 10px}
.shot{flex:none;width:132px;margin:0}
.shot.pad{width:190px}
.shot img{width:100%;display:block;border-radius:9px;border:1px solid var(--hair)}
.shot figcaption{font-size:11.5px;color:var(--ink2);text-align:center;padding-top:6px;font-variant-numeric:tabular-nums}
/* 审计条目：标题优先，元信息一行收底 */
.issue{border:1px solid var(--hair);border-left-width:3px;border-radius:10px;padding:14px 18px;margin-bottom:10px;background:var(--card)}
.issue.crit{border-left-color:var(--crit)}
.issue.warn{border-left-color:var(--warn)}
.issue b.title{font-size:15px;display:block;margin-bottom:4px;letter-spacing:-.005em}
.issue .d{color:var(--ink2);font-size:13.5px;margin:0}
.imeta{display:flex;align-items:center;gap:6px;margin-top:12px;padding-top:10px;border-top:1px solid var(--hair);font-size:12.5px;color:var(--ink2)}
.imeta .src{color:var(--link);text-decoration:none}
.imeta .src::after{content:" ↗";font-size:10px;opacity:.7}
.imeta .state{margin-left:auto;font-weight:600}
.imeta .state.fixed{color:var(--ok)}
.imeta .state.fixed::before{content:"✓ "}
.imeta .state.pend{color:var(--warn)}
.passlist{display:grid;grid-template-columns:1fr 1fr;gap:2px 28px}
.pc{display:flex;gap:9px;font-size:13.5px;padding:7px 0;color:var(--ink);align-items:baseline;text-decoration:none}
.pc::before{content:"✓";color:var(--ok);font-weight:700;flex:none}
a.pc:hover{color:var(--link);text-decoration:none}
@media (max-width:600px){.passlist{grid-template-columns:1fr}}
/* 术语 tooltip */
.t{border-bottom:1px dotted var(--ink2);cursor:help;position:relative;outline:none}
.t::after{content:attr(data-tip);position:absolute;left:50%;bottom:calc(100% + 8px);transform:translateX(-50%) translateY(4px);width:max-content;max-width:280px;background:var(--tipbg);color:var(--tipfg);font-size:12.5px;line-height:1.6;padding:9px 12px;border-radius:9px;opacity:0;pointer-events:none;transition:all .25s ease;z-index:10;text-align:left;white-space:normal;box-shadow:0 10px 30px -10px rgba(0,0,0,.4)}
.t:hover::after,.t:focus::after{opacity:1;transform:translateX(-50%) translateY(0)}
/* 待办 */
.next ol{margin:4px 0 0;padding-left:22px}
.next li{margin:10px 0;font-size:14px}
.next li small{color:var(--ink2);display:block}
footer{color:var(--ink2);font-size:12px;text-align:center;padding:20px}
@media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important}}
@media (max-width:760px){
  .layout{flex-direction:column}
  aside{width:100%;padding:14px 16px 0}
  aside nav{flex-direction:row;overflow-x:auto;gap:4px;padding-bottom:10px}
  aside nav button{white-space:nowrap;width:auto}
  .navgroup{display:none}
  main{border-left:0;padding:18px 16px 60px}
}
.flabel .lim.over{color:var(--crit);font-weight:700}
.empty{color:var(--ink2);font-size:13px;padding:8px 0}
</style><!--
  report-viewer（appstore skill）— 交付页固定壳，参考 opendesign viewer 模式
  本文件是随 skill 分发的固定资产：LLM 不生成、不修改它。
  内容来自内嵌的 <script type="application/json" id="report-data">（由 scripts/build-report.py 注入）。
  数据 schema 见 assets/report-data-template.json；字符计数由本壳现算，超限自动标红。
-->
<div class="topbar">
  <span class="crumb" id="crumb"></span>
  <span class="badge"><span class="dot" id="badge-dot"></span><span id="badge-text"></span></span>
</div>
<div class="layout">
<aside>
  <div class="appid"><div class="appicon" id="app-icon"></div><div><b id="app-name"></b><small id="app-sub"></small></div></div>
  <div class="navgroup">App Store</div>
  <nav id="nav-asc"></nav>
  <div class="navgroup">Skill 产出</div>
  <nav id="nav-skill"></nav>
</aside>
<main id="main"></main>
</div>
<footer>appstore skill 提审交付包 · 栏目与 App Store Connect 后台一一对应 · <a href="https://github.com/Shawn1993/ship-appstore" target="_blank">ship-appstore</a></footer>
<script type="application/json" id="report-data">__REPORT_DATA__</script>
<script>
const D = JSON.parse(document.getElementById('report-data').textContent);
const esc = s => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const h = (s) => s ?? '';           // 信任字段：允许内联 <span class="ev">/<span class="t"> 等
const cn = s => [...String(s ?? '')].length;  // 按字符数（中文=1）

/* ---------- 顶栏与侧栏 ---------- */
document.title = `${D.app.name} · App Store 提审交付包`;
document.getElementById('crumb').innerHTML = `<b>${esc(D.app.name)}</b> · iOS App ${esc(D.app.version)} · 提审交付包`;
document.getElementById('badge-text').textContent = D.status.badge;
document.getElementById('badge-dot').style.background = `var(--${D.status.tone||'warn'})`;
document.getElementById('app-icon').textContent = D.app.icon_char || D.app.name[0];
document.getElementById('app-name').textContent = D.app.name;
document.getElementById('app-sub').textContent = `iOS · ${D.app.version} (build ${D.app.build})`;

/* ---------- 渲染原语 ---------- */
const field = f => {
  let lim = '';
  if (f.limit) {
    const n = cn(f.value.replace(/<[^>]+>/g,''));
    lim = `<span class="lim${n>f.limit?' over':''}">${n}/${f.limit}${f.note?' · '+esc(f.note):''}</span>`;
  } else if (f.note) lim = `<span class="lim">${esc(f.note)}</span>`;
  return `<div class="field"><div class="flabel">${esc(f.label)}${lim}</div>${f.copy===false?'':'<button class="copy">复制</button>'}<p class="fvalue${f.mono?' mono':''}">${h(f.value)}</p></div>`;
};
const card = (title, subtitle, inner) => `<div class="card">${title?`<div class="card-h"><h3>${esc(title)}</h3>${subtitle?`<p>${esc(subtitle)}</p>`:''}</div>`:''}<div class="card-b">${inner}</div></div>`;
const fieldsCard = (arr, title, subtitle) => card(title, subtitle, arr.map(field).join(''));
const statusbar = s => `<div class="statusbar ${s.tone||''}"><div class="dot" style="background:var(--${s.tone||'warn'})"></div><div><b>${h(s.headline)}</b>${s.detail?`<p>${h(s.detail)}</p>`:''}</div></div>`;
const issue = i => `<div class="issue ${i.severity}"><b class="title">${h(i.title)}</b><p class="d">${h(i.desc)}</p><div class="imeta">依据 <a class="src" href="${i.source.url}" target="_blank">${esc(i.source.label)}</a><span class="state ${i.state.type}">${esc(i.state.text)}</span></div></div>`;
const shotrow = g => `<div class="shotrow">${g.items.map(it=>`<figure class="shot${g.pad?' pad':''}"><img src="${it.src}" alt="${esc(it.caption)}" loading="lazy"><figcaption>${esc(it.caption)}</figcaption></figure>`).join('')}</div>`;

/* ---------- 各栏目 ---------- */
const sections = [];
sections.push({id:'overview', nav:'总览', group:'asc', html:
  `<h1>总览</h1><p class="sub">${h(D.meta)}</p>` + statusbar(D.status) +
  card(null, null,
    `<div class="steps">${D.status.steps.map(s=>`<div class="step ${s.state||''}">${esc(s.label)}</div>`).join('')}</div>` +
    `<table class="kv">${D.key_info.map(r=>`<tr><td>${esc(r[0])}</td><td>${h(r[1])}</td></tr>`).join('')}</table>`)});

let vhtml = `<h1>${esc(D.app.version)} 版本信息</h1><p class="sub">字段顺序与 ASC「分发 → 版本页」一致，从上往下逐项对照粘贴即可</p>`;
if (D.screenshots?.length){
  vhtml += card('App 预览和截图', D.screenshots[0].subtitle||'', D.screenshots.map(shotrow).join('') + (D.shots_warning?issue(D.shots_warning):''));
}
vhtml += fieldsCard(D.version_fields);
if (D.review_info?.length) vhtml += fieldsCard(D.review_info, 'App 审核信息');
if (D.release_info?.length) vhtml += fieldsCard(D.release_info, 'App Store 版本发布');
sections.push({id:'version', nav:`${D.app.version} 版本信息`, count:D.version_fields.length+(D.review_info?.length||0)+(D.release_info?.length||0), group:'asc', html:vhtml});

sections.push({id:'appinfo', nav:'App 信息', count:D.appinfo_fields.length, group:'asc', html:
  `<h1>App 信息</h1><p class="sub">对应 ASC 左栏「App 信息」页</p>` + fieldsCard(D.appinfo_fields) + (D.appinfo_issue?issue(D.appinfo_issue):'')});
sections.push({id:'privacy', nav:'App 隐私', count:D.privacy_fields.length, group:'asc', html:
  `<h1>App 隐私</h1><p class="sub">对应 ASC 左栏「App 隐私」页 · 问卷答完必须点「发布」才生效</p>` + fieldsCard(D.privacy_fields)});
sections.push({id:'pricing', nav:'定价与销售范围', group:'asc', html:
  `<h1>定价与销售范围</h1><p class="sub">对应 ASC 左栏「定价与销售范围」页 · 过审后改价格/地区不触发重审</p>` + fieldsCard(D.pricing_fields)});

const unresolved = D.audit.issues.filter(i=>i.state.type!=='fixed').length;
sections.push({id:'audit', nav:'审计与待办', count:unresolved, alert:unresolved>0, group:'skill', html:
  `<h1>审计与待办</h1><p class="sub">${h(D.audit.sub||'规则库扫描结果与下一步动作 · 依据均可点击溯源')}</p>` +
  statusbar(D.audit.status) +
  card('下一步', null, `<div class="next"><ol>${D.audit.next.map(n=>`<li>${h(n.title)}<small>${h(n.note)}</small></li>`).join('')}</ol></div>`) +
  D.audit.issues.map(issue).join('') +
  card(`已核通过 · ${D.audit.passed.length} 条`, null,
    `<div class="passlist">${D.audit.passed.map(p=>p.url?`<a class="pc" href="${p.url}" target="_blank">${esc(p.text)}</a>`:`<span class="pc">${esc(p.text)}</span>`).join('')}</div>`)});

/* ---------- 挂载 + 交互 ---------- */
const main = document.getElementById('main');
for (const s of sections){
  const sec = document.createElement('section'); sec.dataset.tab = s.id; sec.innerHTML = s.html; main.appendChild(sec);
  const btn = document.createElement('button'); btn.dataset.tab = s.id;
  btn.innerHTML = esc(s.nav) + (s.count?`<span class="n${s.alert?' alert':''}">${s.count}</span>`:'');
  document.getElementById(s.group==='asc'?'nav-asc':'nav-skill').appendChild(btn);
}
const buttons = [...document.querySelectorAll('aside nav button')];
function activate(id){
  buttons.forEach(x=>x.classList.toggle('on', x.dataset.tab===id));
  [...main.children].forEach(p=>p.classList.toggle('on', p.dataset.tab===id));
  history.replaceState(null,'','#'+id);
}
buttons.forEach(b=>b.addEventListener('click',()=>activate(b.dataset.tab)));
activate(location.hash.slice(1) && sections.some(s=>s.id===location.hash.slice(1)) ? location.hash.slice(1) : 'overview');
document.querySelectorAll('.copy').forEach(b=>b.addEventListener('click',async()=>{
  const t=b.parentElement.querySelector('.fvalue').textContent;
  try{await navigator.clipboard.writeText(t)}catch(e){const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove()}
  b.textContent='已复制';b.classList.add('ok');setTimeout(()=>{b.textContent='复制';b.classList.remove('ok')},1500)
}));
</script>
